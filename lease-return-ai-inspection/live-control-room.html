<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Live 360 Inspection Control Room</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script><style>body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(150deg,#fff,#faeceb,#eaeef5);color:#171717}.page{min-height:100vh;padding:22px}.panel{background:#fff;border:1px solid #e0e0e0;border-radius:14px;padding:16px}.grid{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:12px}.slot{background:#fff;border:1px solid #e0e0e0;border-radius:10px;min-height:230px}.metric{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:10px}.metric b{font-size:22px}.link{display:inline-block;margin-top:8px;font-size:12px;color:#1557D0;font-weight:900;text-decoration:none}</style></head><body><div class="page"><div class="panel"><h2>Live AI Inspection</h2><div id="grid" class="grid"></div><div style="margin-top:14px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px"><div class="metric"><b id="cosmeticGrade">-</b><span>Cosmetic Grade</span></div><div class="metric"><b id="functionalGrade">-</b><span>Functional Grade</span></div></div><a class="link" href="./eol-grading-standard.html" target="_blank">View grading standard →</a></div></div><script>const STEPS=['Top','Screen','Keyboard','Left','Right','Bottom','Hinge','Adapter'];let analysis={};function computeGrade(){let cosmetic='A',functional='2';Object.values(analysis).forEach(a=>{(a.damages||[]).forEach(d=>{if(d.label==='crack'||d.label==='hinge_damage'){cosmetic='D';functional='4'}else if(d.label==='dent'||d.label==='scratch'){if(cosmetic!=='D')cosmetic='C'}else if(d.label==='screen_mark'){if(cosmetic==='A')cosmetic='B'}if(d.label==='missing_key'){functional='3'}if(d.label==='liquid_mark'){functional='5';cosmetic='D'}})});cosmeticGrade.textContent=cosmetic;functionalGrade.textContent=functional}function render(){computeGrade()}render();</script></body></html>
