<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/><title>Mobile Guided Capture (Live)</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>:root{--brand:#E2231A;--ink:#171717;--ink-3:#787878;--border:#E0E0E0;--font:'Noto Sans','Helvetica Neue',Arial,sans-serif}*{box-sizing:border-box}body{margin:0;font-family:var(--font);background:#f2f2f2}.app{max-width:520px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}.top{padding:14px 16px;background:#fff;border-bottom:1px solid var(--border)}.title{font-size:16px;font-weight:900}.sub{font-size:12px;color:var(--ink-3)}.card{margin:14px 16px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px}.progress{height:8px;background:#eee;border-radius:999px;overflow:hidden;margin:10px 0}.progress i{display:block;height:100%;background:var(--brand);width:var(--p)}.stage{font-size:12px;color:var(--ink-3);display:flex;justify-content:space-between}.guide{position:relative;height:360px;background:#111;border-radius:14px;margin-top:10px}.frame{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border:3px dashed #fff;width:76%;height:47%}.hint{position:absolute;left:10px;right:10px;bottom:10px;background:#fff;border-radius:10px;padding:8px;font-size:11px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.btn{border:0;border-radius:999px;padding:12px;font-weight:900}.primary{background:var(--brand);color:#fff}.secondary{background:#eee}.thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}.thumb{height:60px;background:#fafafa;border:1px solid var(--border);border-radius:8px;overflow:hidden}.thumb img{width:100%;height:100%;object-fit:cover}</style></head><body><div class="app"><div class="top"><div class="title">Live Guided Capture</div><div class="sub">Session: <span id="sid"></span></div></div><section class="card"><div class="progress"><i id="bar" style="--p:0%"></i></div><div class="stage"><span id="step">A-cover</span><span id="count">1/8</span></div><div class="guide"><div class="frame"></div><div class="hint">Align device and take photo</div></div><div class="actions"><label class="btn primary">Take Photo<input id="file" type="file" accept="image/*" capture="environment" hidden></label><button class="btn secondary" id="next">Next</button></div><div class="thumbs" id="thumbs"></div></section></div><script>
const SUPABASE_URL='';
const SUPABASE_ANON_KEY='';
const params=new URLSearchParams(location.search);
const session=params.get('session');
document.getElementById('sid').textContent=session||'N/A';
const steps=['A-cover','Screen','Keyboard','Left','Right','Bottom','Hinge','Adapter'];
let idx=0,photos=[];const $=id=>document.getElementById(id);
function draw(){ $('step').textContent=steps[idx]; $('count').textContent=(idx+1)+'/'+steps.length; $('bar').style.setProperty('--p',Math.round(idx/steps.length*100)+'%'); $('thumbs').innerHTML=photos.map(p=>'<div class="thumb"><img src="'+p+'"></div>').join(''); }
$('file').onchange=e=>{const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{photos[idx]=r.result; upload(r.result,idx); draw();}; r.readAsDataURL(f);};
$('next').onclick=()=>{if(idx<steps.length-1)idx++; draw();};
async function upload(dataUrl,angle){ if(!SUPABASE_URL||!SUPABASE_ANON_KEY||!session){console.log('demo upload');return;} const client=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY); const fileName=session+'-'+angle+'.jpg'; const blob=await (await fetch(dataUrl)).blob(); await client.storage.from('inspection-photos').upload(fileName,blob,{upsert:true}); const {data:{publicUrl}}=client.storage.from('inspection-photos').getPublicUrl(fileName); await client.from('inspection_photos').insert({session_id:session,angle_index:angle,public_url:publicUrl}); }
draw();
</script></body></html>
