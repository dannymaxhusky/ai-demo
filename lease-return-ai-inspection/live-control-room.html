<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Live 360 Inspection Control Room</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(150deg,#fff,#faeceb,#eaeef5);color:#171717}.page{min-height:100vh;padding:22px}.head{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid #e0e0e0;border-radius:14px;padding:16px 18px;margin-bottom:18px}.title{font-size:18px;font-weight:900}.sub{font-size:12px;color:#787878;margin-top:4px}.pill{background:#E2231A;color:#fff;border-radius:99px;padding:7px 12px;font-size:11px;font-weight:900}.main{display:grid;grid-template-columns:340px 1fr;gap:18px}.panel{background:rgba(255,255,255,.86);border:1px solid #e0e0e0;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.12);padding:16px}.qrwrap{text-align:center;background:#fff;border:1px solid #e0e0e0;border-radius:14px;padding:16px}.qrwrap img{width:220px;height:220px}.sid{font-family:monospace;background:#f7f7f7;border:1px solid #e0e0e0;border-radius:8px;padding:8px;margin-top:10px;font-size:11px;word-break:break-all}.status{display:flex;gap:8px;align-items:center;margin:14px 0}.dot{width:9px;height:9px;border-radius:50%;background:#aaa}.dot.on{background:#25a244;box-shadow:0 0 0 5px rgba(37,162,68,.12)}button{border:0;border-radius:99px;padding:10px 12px;font-weight:900;cursor:pointer}.primary{background:#E2231A;color:#fff}.secondary{background:#1a1a1a;color:#fff}.grid{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:12px}.slot{background:#fff;border:1px solid #e0e0e0;border-radius:10px;overflow:hidden;min-height:190px;position:relative}.ph{height:132px;background:linear-gradient(135deg,#f6f6f6,#fff);display:flex;align-items:center;justify-content:center;color:#aaa;font-size:11px}.slot img{width:100%;height:132px;object-fit:cover}.overlay{position:absolute;top:0;left:0;width:100%;height:132px;pointer-events:none}.box{position:absolute;border:2px solid red;border-radius:4px}.meta{padding:10px}.meta b{font-size:12px}.meta p{font-size:10px;color:#787878;margin:4px 0}.tag{display:inline-block;background:#FFF0EF;color:#E2231A;border-radius:99px;font-size:9px;font-weight:900;padding:4px 7px}.toast{position:fixed;right:20px;bottom:20px;background:#1a1a1a;color:#fff;border-radius:12px;padding:12px 14px;font-size:12px;display:none}.toast.show{display:block}@media(max-width:900px){.main{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}}</style></head><body><div class="page"><div class="head"><div><div class="title">Live 360 Image Inspection Control Room</div><div class="sub">AI-enhanced inspection with real-time damage detection</div></div><span class="pill">AI ENABLED</span></div><div class="main"><aside class="panel"><h2>Start live inspection</h2><p style="font-size:12px;color:#4E444E;line-height:1.55">Scan QR → capture images → AI analyzes → damages highlighted in real time.</p><div class="qrwrap"><img id="qr"><div style="font-size:11px;color:#787878;margin-top:8px">Scan with phone</div><div class="sid" id="sid"></div></div><div class="status"><span class="dot" id="dot"></span><b id="conn">Waiting for mobile upload</b></div><button class="primary" onclick="newSession()">New Session</button></aside><section class="panel"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2>Live AI Inspection</h2><span class="pill" id="count">0 / 8</span></div><div class="grid" id="grid"></div></section></div><div class="toast" id="toast">AI analysis complete</div></div><script>const SUPABASE_URL='https://hezypxkhkagiuxaygkzt.supabase.co';const SUPABASE_ANON_KEY=['sb','publishable','useFGsYtSouik','MSKhRs','A','I1zRyP2Q'].join('_');const STEPS=['A-cover / Top','Screen','Keyboard','Left','Right','Bottom','Hinge','Adapter'];let sessionId,client,channel,photos={},analysis={};function uuid(){return 'ins-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,8)}function mobileUrl(){return location.origin+'/lease-return-ai-inspection/mobile-capture-live.html?session='+encodeURIComponent(sessionId)}function newSession(){sessionId=uuid();photos={};analysis={};sid.textContent=sessionId;qr.src='https://quickchart.io/qr?size=260&text='+encodeURIComponent(mobileUrl());render();subscribe()}function render(){grid.innerHTML=STEPS.map((s,i)=>{const p=photos[i];const a=analysis[i];return `<div class="slot">${p?`<img src="${p.url}">`:`<div class="ph">Waiting</div>`}<div class="overlay">${a?renderBoxes(a):''}</div><div class="meta"><b>${i+1} · ${s}</b><p>${a?a.summary:'No AI yet'}</p></div></div>`}).join('');count.textContent=Object.keys(photos).length+' / '+STEPS.length;dot.classList.toggle('on',Object.keys(photos).length>0)}function renderBoxes(a){return a.damages.map(d=>`<div class="box" style="left:${d.box.x*100}%;top:${d.box.y*100}%;width:${d.box.w*100}%;height:${d.box.h*100}%"></div>`).join('')}function toast(){const t=document.querySelector('.toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}async function analyzeImage(i,url){const res=await fetch('/.netlify/functions/analyze-damage',{method:'POST',body:JSON.stringify({imageUrl:url,angleName:STEPS[i]})});const data=await res.json();analysis[i]=data;render();toast()}function addPhoto(row){photos[row.angle_index]={url:row.public_url,created_at:row.created_at};render();analyzeImage(row.angle_index,row.public_url)}function subscribe(){client=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);channel=client.channel('inspection-'+sessionId).on('postgres_changes',{event:'INSERT',schema:'public',table:'inspection_photos',filter:'session_id=eq.'+sessionId},payload=>addPhoto(payload.new)).subscribe()}newSession();</script></body></html>
